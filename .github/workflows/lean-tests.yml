name: Lean Tests

on:
  pull_request:
    paths:
      - "lean4/**"
      - "lakefile.lean"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/lean-tests.yml"
  push:
    branches:
      - master
    paths:
      - "lean4/**"
      - "lakefile.lean"
      - "lake-manifest.json"
      - "lean-toolchain"
      - ".github/workflows/lean-tests.yml"
  workflow_dispatch:

jobs:
  lean-tests:
    name: Lake Driver + Profiles
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout LeanBench Sibling
        run: git clone --depth 1 https://github.com/alok/LeanBench.git ../LeanBench

      - name: Install Elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lake Version
        run: lake --version

      - name: Check Test Driver
        run: lake check-test

      - name: Build Test Driver
        run: lake build tg4_tests

      - name: Run Fast Profile
        run: lake test

      - name: Run Medium Profile
        run: lake test -- --profile medium

      - name: Run Slow Profile
        run: lake test -- --profile slow
